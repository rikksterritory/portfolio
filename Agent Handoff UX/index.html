<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Handoff UX — ServiceAI Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Wise Neptune Design System ── */
  --bg:       #0D0D0D;
  --bg-1:     #141414;
  --bg-2:     #1C1C1C;
  --bg-3:     rgba(255,255,255,0.04);
  --surface:  rgba(255,255,255,0.06);
  --surface-2:rgba(255,255,255,0.10);

  --green:    #9FE870;
  --green-dk: #7DD65A;
  --green-lt: rgba(159,232,112,0.15);
  --green-bd: rgba(159,232,112,0.28);

  --amber:    #F5A623;
  --amber-bg: rgba(245,166,35,0.12);
  --amber-bd: rgba(245,166,35,0.3);

  --red:      #FF6B6B;
  --red-bg:   rgba(255,107,107,0.12);
  --red-bd:   rgba(255,107,107,0.3);

  --blue:     #60A5FA;
  --blue-bg:  rgba(96,165,250,0.12);
  --blue-bd:  rgba(96,165,250,0.25);

  --text:     #FFFFFF;
  --text-2:   rgba(255,255,255,0.65);
  --text-3:   rgba(255,255,255,0.38);
  --border:   rgba(255,255,255,0.09);
  --border-2: rgba(255,255,255,0.16);

  --r-sm:  8px;
  --r:     16px;
  --r-lg:  20px;
  --r-pill:999px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
  --shadow:    0 4px 16px rgba(0,0,0,0.4),  0 0 0 1px rgba(255,255,255,0.07);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.07);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased}

@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
@keyframes slide-in-r{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:none}}
@keyframes slide-in-l{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:none}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes modal-in{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes check-pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

.anim-r{animation:slide-in-r .32s cubic-bezier(.22,1,.36,1) both}
.anim-l{animation:slide-in-l .32s cubic-bezier(.22,1,.36,1) both}
.anim-fade{animation:fade-in .2s ease both}

/* ── Buttons (Wise pill style) ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 20px;border-radius:var(--r-pill);border:none;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .16s;white-space:nowrap;letter-spacing:-0.01em}
.btn-primary{background:var(--green);color:#163300}
.btn-primary:hover{background:var(--green-dk);transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(159,232,112,0.3)}
.btn-primary:active{transform:translateY(0);box-shadow:none}
.btn-primary:disabled{background:rgba(159,232,112,0.3);color:rgba(22,51,0,0.4);cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;color:var(--text);border:1.5px solid var(--border-2)}
.btn-ghost:hover{background:var(--surface);border-color:rgba(255,255,255,0.28)}
.btn-green{background:var(--green);color:#163300}
.btn-green:hover{background:var(--green-dk)}
.btn-grey{background:var(--surface);color:var(--text-2);border:1.5px solid var(--border)}
.btn-grey:hover{background:var(--surface-2);color:var(--text)}
.btn-sm{padding:6px 14px;font-size:12px}

/* ── Cards ── */
.card{background:rgba(255,255,255,0.05);border-radius:var(--r);
  box-shadow:none;border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}

/* ── Glass bubble base ── */
.bubble-ai{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 2px 12px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.08)}
.bubble-user{
  background:rgba(159,232,112,0.18);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(159,232,112,0.28);
  box-shadow:0 2px 12px rgba(0,0,0,0.25),inset 0 1px 0 rgba(159,232,112,0.15)}

/* ── Chips / Tags ── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:var(--r-pill);font-size:11px;font-weight:600;letter-spacing:0.02em}
input,textarea{font-family:'Inter',sans-serif;font-size:13px;outline:none}
textarea{resize:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.28)}

.tag-green{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd)}
.tag-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.tag-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.tag-grey{background:var(--surface);color:var(--text-2);border:1px solid var(--border)}

.hover-row:hover{background:var(--surface-2);cursor:pointer}
.checkbox-custom{width:16px;height:16px;border:2px solid rgba(255,255,255,0.25);border-radius:5px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .14s;flex-shrink:0}
.checkbox-custom.checked{background:var(--green);border-color:var(--green)}
</style>
</head>

<div id="root"></div>

const BotIcon = ({ size }) => (
  <svg width={size*0.62} height={size*0.62} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="4" y="7" width="16" height="12" rx="3"/>
    <path d="M12 7V3"/><circle cx="12" cy="3" r="1" fill="currentColor"/>
    <circle cx="9" cy="13" r="1.2" fill="currentColor" stroke="none"/>
    <circle cx="15" cy="13" r="1.2" fill="currentColor" stroke="none"/>
    <path d="M9 17h6"/><path d="M2 13v2M22 13v2"/>
  </svg>
);

const Av = ({ initials, grad, size=32, ring=false }) => {
  const isBot = initials==='AVA';
  return (
    <div style={{width:size,height:size,borderRadius:'50%',flexShrink:0,
      background:grad||'linear-gradient(135deg,#9FE870,#7DD65A)',
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:size*.27,fontWeight:700,color:isBot?'rgba(255,255,255,0.9)':'#163300',
      boxShadow:ring?`0 0 0 2px #163300,0 0 0 4px ${grad?.includes('9FE870')?'#9FE870':'#9FE870'}`:'none'}}>
      {isBot ? <BotIcon size={size}/> : initials}
    </div>
  );
};

const Dot = ({ color='#9FE870', size=8 }) => (
  <span style={{width:size,height:size,borderRadius:'50%',background:color,
    display:'inline-block',flexShrink:0,animation:'pulse-dot 2s infinite'}} />
);

const Tag = ({ children, cls, style={} }) => (
  <span className={`chip ${cls}`} style={style}>{children}</span>
);

const SLabel = ({ children, style={} }) => (
  <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',
    letterSpacing:'0.1em',color:'rgba(255,255,255,0.38)',...style}}>{children}</div>
);

const Divider = ({ my=12 }) => (
  <div style={{height:1,background:'rgba(255,255,255,0.08)',margin:`${my}px 0`}} />
);

const PBadge = ({ title, desc }) => (
  <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 14px',
    borderRadius:'var(--r-pill)',background:'rgba(159,232,112,0.1)',
    border:'1px solid rgba(159,232,112,0.2)'}}>

    <span style={{fontSize:10,color:'rgba(255,255,255,0.3)'}}>—</span>
    <span style={{fontSize:10,color:'rgba(255,255,255,0.55)'}}>{desc}</span>
  </div>
);

const CheckItem = ({ checked, label, sub, onToggle }) => (
  <div onClick={onToggle} style={{display:'flex',gap:10,alignItems:'flex-start',
    padding:'9px 12px',borderRadius:'var(--r-sm)',cursor:'pointer',
    background:checked?'rgba(159,232,112,0.06)':'transparent',
    border:`1px solid ${checked?'rgba(159,232,112,0.22)':'transparent'}`,
    transition:'all .14s'}}>
    <div className={`checkbox-custom ${checked?'checked':''}`} style={{marginTop:1}}>
      {checked&&<svg width="9" height="7" viewBox="0 0 9 7" fill="none">
        <path d="M1 3.5L3.5 6L8 1" stroke="#163300" strokeWidth="1.5"

    </div>

      <div style={{fontSize:13,fontWeight:500,color:'var(--text)',lineHeight:1.4}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:'var(--text-3)',marginTop:1}}>{sub}</div>}

Object.assign(window,{Av,Dot,Tag,SLabel,Divider,PBadge,CheckItem});

<script type="text/babel">

const Screen1 = () => {

<script type="text/babel">

];

const PRINCIPLES = [
  {title:'Confident Autonomy',  desc:'AI handles routine cases end-to-end without human intervention'},
  {title:'Honest Limitation',   desc:'AI acknowledges boundaries before the customer notices the gap'},
  {title:'Graceful Escalation', desc:'AI triggers handoff before frustration sets in — with full context ready'},
  {title:'Context Continuity',  desc:'The customer never has to repeat themselves across the handoff'},
  {title:'Human in the Loop',   desc:'AI summarises context and options — the human makes the call'},
  {title:'Augmented Judgment',  desc:'AI drafts the response, the human refines and owns it'},
  {title:'Continuous Learning', desc:'Every handoff improves the agent for future cases'},
];

const WHO_COLORS = {
  'Customer view':{bg:'var(--blue-bg)',text:'var(--blue)'},
  'Rep view':     {bg:'var(--green-lt)',text:'var(--green)'},
};

const App = () => {
  const stored=(()=>{try{return parseInt(localStorage.getItem('handoff_screen')||'0');}catch{return 0;}})();
  const [cur,setCur] = useState(stored);
  const [dir,setDir] = useState('r');
  const [animKey,setAnimKey] = useState(0);

  const go = (n) => {
    if(n===cur) return;
    setDir(n>cur?'r':'l');
    setAnimKey(k=>k+1);
    setCur(n);
    try{localStorage.setItem('handoff_screen',String(n));}catch{}
  };

  useEffect(()=>{
    const h=(e)=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
      if(e.key==='ArrowRight'&&cur<6) go(cur+1);
      if(e.key==='ArrowLeft'&&cur>0) go(cur-1);
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[cur]);

  const principle = PRINCIPLES[cur];
  const ScreenComp = window[SCREENS[cur].component];

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',
      fontFamily:"'Inter', sans-serif",background:'var(--bg)'}}>

      {/* ── Top nav — Wise dark forest green ── */}
      <div style={{background:'var(--bg-1)',padding:'0 24px',display:'flex',
        alignItems:'center',justifyContent:'space-between',height:52,flexShrink:0,
        borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {/* Wise Fastflag-inspired logo mark */}
            <div style={{width:26,height:26,borderRadius:'50%',background:'var(--green)',
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 11L7 3L11 11" stroke="#163300" strokeWidth="2.2"
                  strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M4.5 8h5" stroke="#163300" strokeWidth="2.2" strokeLinecap="round"/>
              </svg>
            </div>
            <span style={{fontSize:14,fontWeight:700,letterSpacing:'-0.02em'}}>ServiceAI</span>
            <span style={{fontSize:13,color:'var(--text-3)',marginLeft:2}}>/ Support Console</span>
          </div>
          <div style={{width:1,height:18,background:'var(--border)'}}/>
          <span style={{fontSize:12,color:'var(--text-2)'}}>
            Case CS-48821 · Marcus Webb · Acme Corp
          </span>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <Av initials="SC" grad="linear-gradient(135deg,#8B5CF6,#7C3AED)" size={28}/>
          <span style={{fontSize:12,color:'var(--text-2)',fontWeight:500}}>Sarah Chen</span>
        </div>
      </div>


      {/* ── Screen area ── */}
      <div style={{flex:1,overflow:'hidden',padding:'16px 20px',
        display:'flex',flexDirection:'column',gap:12}}>

        <div key={animKey}
          style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',
            borderRadius:'var(--r-lg)',position:'relative',
            animation:`${dir==='r'?'slide-in-r':'slide-in-l'} .32s cubic-bezier(.22,1,.36,1) both`}}>
          {ScreenComp?<ScreenComp/>:<div style={{padding:24,color:'var(--text-3)'}}>Loading…</div>}
        </div>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <PBadge title={principle.title} desc={principle.desc}/>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button className="btn btn-grey btn-sm" onClick={()=>go(cur-1)} disabled={cur===0}
              style={{opacity:cur===0?.35:1,display:'flex',alignItems:'center',gap:6}}>
              ← Back
              {cur>0&&<span style={{color:'var(--text-3)',fontWeight:400}}>{SCREENS[cur-1].label}</span>}
            </button>
            <span style={{fontSize:11,color:'var(--text-3)',padding:'0 4px'}}>{cur+1} / {SCREENS.length}</span>
            {cur===6
              ?<button className="btn btn-grey btn-sm" onClick={()=>go(0)}
                  style={{display:'flex',alignItems:'center',gap:6}}>
                  ↺ Restart
                </button>
              :<button className="btn btn-primary btn-sm" onClick={()=>go(cur+1)}
                  style={{display:'flex',alignItems:'center',gap:6}}>
                  {SCREENS[cur+1].label} →
                </button>
            }
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
